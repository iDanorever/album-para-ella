<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSySyCSN-hqf0NPTMwSRw-d8A4cmiTfTHHxZg",
      authDomain: "album-para-ella.firebaseapp.com",
      databaseURL: "https://album-para-ella-default-rtdb.firebaseio.com/",
      projectId: "album-para-ella",
      storageBucket: "album-para-ella.appspot.com",
      messagingSenderId: "94346844200",
      appId: "1:94346844200:web:cb447fad25e0c2f2bd5e2f",
      measurementId: "G-KZD92NNT5"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nuestro Álbum de Recuerdos 💕</title>
  <style>
    body { 
      background: linear-gradient(to bottom, #fff0f5, #ffe4e1); 
      font-family: 'Georgia', serif; 
      margin: 0; padding: 10px; text-align: center; overflow-x: hidden; 
    }
    .main-container { max-width: 1000px; margin: 0 auto; }
    #album {
      width: 900px; height: 600px; margin: 40px auto;
      position: relative; 
      perspective: 2200px;
      background: #f9f9f9; border-radius: 6px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }
    .page {
      width: 100%; height: 100%; background: #fffef7;
      position: absolute; top: 0; left: 0;
      box-shadow: 10px 15px 30px rgba(0,0,0,0.25);
      transform-origin: left center;
      transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1), box-shadow 1.8s;
      backface-visibility: hidden;
      overflow: hidden;
    }
    .page.active { transform: rotateY(-12deg) rotateX(4deg) skewY(-2deg); z-index: 10; box-shadow: 25px 35px 50px rgba(0,0,0,0.3); }
    .page.prev { transform: rotateY(-168deg) skewY(3deg); box-shadow: -25px 15px 35px rgba(0,0,0,0.35); z-index: 5; }
    .page.next { transform: rotateY(168deg) skewY(-3deg); box-shadow: 25px 15px 35px rgba(0,0,0,0.35); z-index: 5; }

    /* ANILLOS y perforaciones (se mantienen) */
    .page::before {
      content: "";
      position: absolute; left: -12px; top: 0; width: 24px; height: 100%;
      background: repeating-radial-gradient(circle at 12px 20px, #c0c0c0 0, #c0c0c0 3px, transparent 3px, transparent 12px);
      background-size: 24px 40px; z-index: 25; pointer-events: none; transform: translateX(-50%);
    }
    .page::after {
      content: "";
      position: absolute; left: 8px; top: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 0 20px, rgba(0,0,0,0.08) 1px, transparent 1.5px);
      background-size: 30px 40px; pointer-events: none; z-index: 5; opacity: 0.6;
    }

.photo-wrapper {
  width: 98%;                     /* casi todo el ancho de la hoja */
  height: 92%;                    /* ocupa casi toda la altura posible */
  margin: 4% auto 2% 1%;          /* márgenes mínimos para que llegue cerca de los bordes */
  display: grid;
  grid-template-rows: 1fr 1fr;    /* dos slots iguales: arriba y abajo */
  gap: 15px;                      /* separación pequeña entre fotos para maximizar tamaño */
  padding: 6px;                   /* padding mínimo para que las fotos se extiendan más */
  position: relative;
  z-index: 15;
  box-sizing: border-box;
}

.photo-box {
  width: 100%;
  height: 100%;                   /* llena completamente el slot (muy grueso y alto) */
  position: relative;
  overflow: hidden;               /* no deja que la imagen se salga */
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.3);  /* fondo muy sutil */
  box-shadow: 0 8px 22px rgba(0,0,0,0.2); /* sombra gruesa para que se vea "grande" */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.photo-box img {
  width: 100%;
  height: 100%;                   /* ocupa TODO el rectángulo (extiende al máximo) */
  object-fit: cover;              /* rellena todo el espacio, se ve grueso y grande */
  object-position: center;
  border-radius: 12px;
}

    .photo-wrapper img { 
      width: 100%; max-height: 42%; object-fit: contain; border-radius: 8px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.18); 
    }

    .controls { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 20; }
    .controls button { background: rgba(0,0,0,0.65); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 1.2em; }
  .timestamp {
  position: absolute;
  bottom: 8px;                    /* justo abajo de la foto, dentro del rectángulo */
  left: 50%;
  transform: translateX(-50%);
  color: #d81b60;
  font-size: 0.95em;              /* un poco más visible */
  background: rgba(255,255,255,0.92);
  padding: 5px 14px;
  border-radius: 20px;
  z-index: 14;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  white-space: nowrap;
}
    
    /* Botón borrar página - esquina superior derecha */
    .delete-page {
      position: absolute; top: 12px; right: 18px;  /* ← ajustado a esquina derecha */
      background: #f44336; color: white; border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 18px; cursor: pointer; z-index: 35;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Número de página - esquina inferior derecha */
    .page-number {
  position: absolute;
  top: 15px;               /* mismo nivel que la X */
  right: 55px;             /* justo a la izquierda de la X (ajusta si es necesario) */
  font-size: 0.9em;
  color: #c71585;
  background: rgba(255, 255, 255, 0.8);
  padding: 3px 8px;
  border-radius: 10px;
  z-index: 36;             /* justo debajo de la X pero encima de todo */
  font-weight: bold;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

    #addPageBtn { padding: 12px 32px; background: #ff69b4; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1em; margin: 20px auto; display: block; z-index: 9999; pointer-events: auto; }
    .navigation-arrows { display: flex; position: fixed; bottom: 40px; left: 0; right: 0; justify-content: space-between; padding: 0 30px; z-index: 900; }
    .navigation-arrows button { background: rgba(255,105,180,0.85); color: white; border: none; border-radius: 50%; width: 65px; height: 65px; font-size: 2.2em; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.25); z-index: 901; }
    .form-container { max-width: 420px; margin: 25px auto; text-align: center; }
    @media (max-width: 768px) { 
      #album { width: 96%; height: 580px; } 
      .photo-wrapper { margin-left: 8%; width: 84%; } 
    }
  </style>
</head>
<body>
  <h1 style="color: #c71585; font-size: 1.8em; margin: 10px;">Nuestros Momentos Eternos 💖</h1>

  <div class="main-container">
    <div id="album"></div>

    <div class="form-container">
      <h3 style="color: #c71585;">Sube un recuerdo nuevo 💕</h3>
      <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 10px; width: 100%;">
      <button id="uploadBtn" style="padding: 10px 25px; background: #ff69b4; color: white; border: none; border-radius: 25px; cursor: pointer;">Subir Foto</button>
      <p id="uploadStatus" style="margin-top: 10px; color: #c71585;"></p>
    </div>

    <div id="addPageWrapper">
      <button id="addPageBtn">Agregar Nueva Página +</button>
    </div>
  </div>

  <div class="navigation-arrows">
    <button id="prevPage">←</button>
    <button id="nextPage">→</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    let pages = [];
    let currentIndex = 0;

    function createPage() {
      const page = $('<div class="page"></div>');
      const wrapper = $('<div class="photo-wrapper"></div>');
      page.append(wrapper);
      $('#album').append(page);
      pages.push(page);
      updatePages();
      return page;
    }

    function updatePages() {
  pages.forEach((page, index) => {
    page.removeClass('active prev next');
    page.css('z-index', 0); // reset primero

    if (index === currentIndex) {
      page.addClass('active');
      page.css('z-index', 100 + pages.length - index); // más alto para la activa
    } else if (index === currentIndex - 1) {
      page.addClass('prev');
      page.css('z-index', 50 + (currentIndex - index)); // atrás pero visible
    } else if (index === currentIndex + 1) {
      page.addClass('next');
      page.css('z-index', 50 - (index - currentIndex)); // adelante pero debajo
    } else if (index < currentIndex) {
      // páginas atrás: z-index bajo y decreciente
      page.css('z-index', 10 + (currentIndex - index));
    } else {
      // páginas adelante: z-index muy bajo
      page.css('z-index', 5 - (index - currentIndex));
    }

    // Número de página con total actual (borra y pone nuevo)
    page.find('.page-number').remove();
    const total = pages.length;
    const num = index + 1;
    const pageNum = $('<div class="page-number"></div>').text(`${num}/${total}`);
    page.append(pageNum);
  });
}

    function addMediaToPage(page, url, timestamp = null, key = null) {
      let container = page.find('.photo-wrapper');
      if (container.children('.photo-box').length >= 2) {
        alert("Esta hoja ya tiene 2 fotos 💕 Agrega una nueva página.");
        return false;
      }
      const photoBox = $('<div class="photo-box"></div>').css({ position: 'relative' });
      const img = $('<img>').attr('src', url).css({
        width: '100%',
        maxHeight: '42%',
        objectFit: 'contain',
        borderRadius: '10px',
        boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
        margin: '0 auto',
        display: 'block'
      });
      photoBox.append(img);
      if (timestamp) {
        const date = new Date(timestamp);
        const formatted = date.toLocaleString('es-PE', { dateStyle: 'short' });
        photoBox.append('<div class="timestamp">📅 ' + formatted + '</div>');
      }
      if (key) {
        const controls = $('<div class="controls"></div>');
        controls.append(
          $('<button>📥</button>').click(() => {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'recuerdo.jpg';
            a.click();
          }),
          $('<button>🔄</button>').click(() => {
            if (!confirm("¿Reemplazar esta imagen?")) return;
            const input = $('<input type="file" accept="image/*">').on('change', e => {
              const newFile = e.target.files[0];
              if (!newFile) return;
              const formData = new FormData();
              formData.append('file', newFile);
              formData.append('upload_preset', 'album_preset');
              fetch('https://api.cloudinary.com/v1_1/dqf69c8cn/image/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(d => {
                  if (d.secure_url) database.ref('recuerdos/' + key).update({ url: d.secure_url });
                });
            });
            input.click();
          }),
          $('<button>❌</button>').click(() => {
            if (confirm("¿Borrar esta imagen?")) database.ref('recuerdos/' + key).remove();
          })
        );
        photoBox.append(controls);
      }
      container.append(photoBox);
      return true;
    }

    function addDeleteButton(page, index) {
      if (index === 0) return; // No borrar la primera página

      // Evitar duplicados
      page.find('.delete-page').remove();

      const deleteBtn = $('<button class="delete-page">×</button>');
      deleteBtn.click(function() {
        if (confirm("¿Estás seguro de borrar esta página?\nLas fotos quedarán guardadas en la nube y podrás agregarlas de nuevo después.")) {
          page.remove();
          pages.splice(index, 1);
          if (currentIndex >= pages.length) currentIndex = pages.length - 1;
          updatePages();
          database.ref('settings/pageCount').set(pages.length);
        }
      });
      page.append(deleteBtn);
    }

    // Cargar páginas y fotos guardadas al inicio
   // Cargar todo de forma ordenada para que el total sea consistente
$(document).ready(() => {
  // Paso 1: cargar conteo de páginas y crearlas primero
  database.ref('settings/pageCount').once('value').then(snap => {
    let savedCount = snap.val() || 1;

    // Crear exactamente las páginas guardadas
    for (let i = pages.length; i < savedCount; i++) {
      const newPage = createPage();
      if (i > 0) addDeleteButton(newPage, i);
    }

    // Paso 2: ahora sí cargar las fotos
    database.ref('recuerdos').once('value').then(snapshot => {
      const recuerdos = snapshot.val() || {};
      let extraPagesCreated = false;

      Object.keys(recuerdos).forEach(key => {
        const data = recuerdos[key];
        let added = false;

        // Intentar colocar en páginas existentes
        for (let i = 0; i < pages.length; i++) {
          if (addMediaToPage(pages[i], data.url, data.timestamp, key)) {
            added = true;
            break;
          }
        }

        // Si no cupo → crear página nueva
        if (!added) {
          const newPage = createPage();
          addDeleteButton(newPage, pages.length - 1);
          addMediaToPage(newPage, data.url, data.timestamp, key);
          extraPagesCreated = true;
          currentIndex = pages.length - 1;
        }
      });

      // Si creamos páginas extras → actualizar conteo una sola vez
      if (extraPagesCreated) {
        database.ref('settings/pageCount').set(pages.length);
      }

      // Finalmente: actualizar vista y números con el total definitivo
      updatePages();
    });
  });
});

    $("#addPageBtn").click(function() {
      const newPage = createPage();
      addDeleteButton(newPage, pages.length - 1);
      currentIndex = pages.length - 1;
      updatePages();
      database.ref('settings/pageCount').set(pages.length);
    });

    $("#prevPage").click(function() {
  if (currentIndex > 0) {
    currentIndex--;
    updatePages();
  }
});

$("#nextPage").click(function() {
  if (currentIndex < pages.length - 1) {
    currentIndex++;
    updatePages();
  } else {
    // Opcional: alerta si estás en la última
    // alert("¡Estás en la última página! Agrega una nueva si quieres más.");
  }
});

    document.getElementById('uploadBtn').addEventListener('click', function() {
      const file = document.getElementById('fileInput').files[0];
      const status = document.getElementById('uploadStatus');
      if (!file) return status.textContent = "Elige una foto primero 💕";

      let canAdd = false;
      for (let i = 0; i < pages.length; i++) {
        if (pages[i].find('.photo-wrapper').children('.photo-box').length < 2) {
          canAdd = true;
          break;
        }
      }
      if (!canAdd) {
        alert("¡Todas las hojas están llenas! 💕\nAgrega una nueva página primero con el botón de abajo.");
        status.textContent = "Necesitas agregar una página nueva";
        return;
      }

      status.textContent = "Procesando... 😊";
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', 'album_preset');

      fetch('https://api.cloudinary.com/v1_1/dqf69c8cn/image/upload', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.secure_url) {
            database.ref('recuerdos').push({ url: data.secure_url, timestamp: firebase.database.ServerValue.TIMESTAMP });
            status.textContent = "¡Guardado! 💖";
            document.getElementById('fileInput').value = '';
            addMediaToPage(pages[currentIndex], data.secure_url);
          }
        });
    });

    // Inicializar primera página
    createPage();
    updatePages();
  </script>
</body>
</html>
