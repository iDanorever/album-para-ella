    .decoration {

      z-index: 1;
      opacity: 0.85;

    }

    .controls { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(255,255,255,0.7); padding: 8px 15px; border-radius: 30px; display: flex; gap: 10px; }
    .controls button { padding: 6px 14px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
    .delete-btn { background: #ff4d4d; color: white; }
    .replace-btn { background: #ff69b4; color: white; }
    .timestamp { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); color: #c71585; font-size: 0.85em; z-index: 10; background: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 20px; }
    #flipbook .page img {
      max-width: 75% !important;
      height: auto !important;
      margin: 0 auto;
      display: block;

    /* Tamaños y opacidad por imagen */
    .decoration.rosa-esquina1 { max-width: 120px; opacity: 0.85; transform: rotate(-15deg); }

    .decoration.rosa-rosa-esquina { max-width: 130px; opacity: 0.75; }
    .decoration.corazon-flor { max-width: 100px; opacity: 0.8; }
    .decoration.flores-acuarela { max-width: 140px; opacity: 0.7; }
    .decoration.bouquet-rosa { max-width: 150px; opacity: 0.85; transform: rotate(10deg); }
    .decoration.petalos-suaves { max-width: 160px; opacity: 0.6; animation: fadeDown 10s linear infinite; }
    .decoration.corazon-rosa { max-width: 90px; opacity: 0.8; }
    .decoration.corazon-pequeno { max-width: 70px; opacity: 0.75; }
    .decoration.rosas-pequenas { max-width: 110px; opacity: 0.85; transform: rotate(-10deg); }
    .decoration.flor-solitaria { max-width: 100px; opacity: 0.8; }
    .decoration.petalos-rosa { max-width: 140px; opacity: 0.6; animation: fadeDown 10s linear infinite; }
    @keyframes fadeDown {
      0% { opacity: 0.8; transform: translateY(-40px); }
      100% { opacity: 0.2; transform: translateY(120px); }
    }

.controls {
  pointer-events: none;
}

.controls button {

<body>
  <h1 style="color: #c71585; font-size: 1.8em; margin: 10px;">Nuestros Momentos Eternos 💖</h1>

 <div class="book-wrapper">
  <div id="flipbook">
  <div class="page">

      <img src="images/portadanueva.jpg"

    </div>
</div> <!-- ✅ AQUÍ SE CIERRA EL FLIPBOOK -->


<!-- Flechas de navegación (FUERA del flipbook) -->
<div class="navigation-arrows" 
     style="display: flex; position: fixed; bottom: 30px; left: 0; right: 0; z-index: 1000; justify-content: space-between; padding: 0 20px;">
  
  <button id="prevPage"
          style="background: rgba(255,105,180,0.8); color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 2em; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">

    →
  </button>
</div>


<!-- Formulario para subir fotos (FUERA del flipbook) -->
<div style="margin: 20px 0; padding: 15px; background: #fff0f5; border-radius: 15px; max-width: 400px; margin-left: auto; margin-right: auto;">
  <h3 style="color: #c71585; margin-bottom: 10px;">Sube un recuerdo nuevo 💕</h3>
  
  <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 10px;">
  
  <button id="uploadBtn"
          style="padding: 10px 25px; background: #ff69b4; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1em;">
    Subir Foto
  </button>
  
  <p id="uploadStatus" style="margin-top: 10px; color: #c71585;"></p>
</div>


<!-- Botón agregar página -->
<div id="addPageWrapper">
  <button id="addPageBtn">
    Agregar Nueva Página +
  </button>
</div>


   
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
  <script>


    
    // Inicialización global para book
    let book;

    const decorations = [
      'decorations/rosa-esquina1.png',
      'decorations/petalos-cayendo.png',
      'decorations/rosa-rosa-esquina.png',
      'decorations/corazon-flor.png',
      'decorations/flores-acuarela.png',
      'decorations/bouquet-rosa.png',
      'decorations/petalos-suaves.png',
      'decorations/corazon-rosa.png',
      'decorations/corazon-pequeno.png',
      'decorations/rosas-pequenas.png',
      'decorations/flor-solitaria.png',
      'decorations/petalos-rosa.png'
    ];

    const positions = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];

    const decorPositions = {
      'rosa-esquina1.png': ['top-left', 'top-right'],
      'petalos-cayendo.png': ['bottom-left', 'bottom-right'],
      'rosa-rosa-esquina.png': ['top-right', 'bottom-right'],
      'corazon-flor.png': ['top-left', 'top-right'],
      'flores-acuarela.png': ['bottom-left', 'bottom-right'],
      'bouquet-rosa.png': ['bottom-left', 'bottom-right'],
      'petalos-suaves.png': ['bottom-left', 'bottom-right'],
      'corazon-rosa.png': ['top-left', 'top-right'],
      'corazon-pequeno.png': ['bottom-left', 'bottom-right'],
      'rosas-pequenas.png': ['bottom-left', 'bottom-right'],
      'flor-solitaria.png': ['top-left', 'bottom-left'],
      'petalos-rosa.png': ['bottom-left', 'bottom-right']
    };



   function addRandomDecorations(page) {
  const positions = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
  const decorations = [
    'rosa-esquina1.png',
    'petalos-cayendo.png',
    'rosa-rosa-esquina.png',
    'corazon-flor.png',
    'flores-acuarela.png',
    'bouquet-rosa.png',
    'petalos-suaves.png',
    'corazon-rosa.png',
    'corazon-pequeno.png',
    'rosas-pequenas.png',
    'flor-solitaria.png',
    'petalos-rosa.png'
  ];



  // Elegir aleatoriamente 1 o 2 decorations para esta página
  const numDeco = Math.floor(Math.random() * 2) + 1;
  const usedPositions = new Set();

  for (let i = 0; i < numDeco; i++) {
    let pos;
    do {
      pos = positions[Math.floor(Math.random() * positions.length)];
    } while (usedPositions.has(pos));
    usedPositions.add(pos);

    // Elegir una decoration random
    const decoFile = 'decorations/' + decorations[Math.floor(Math.random() * decorations.length)];
    const img = $('<img>').addClass('decoration ' + pos).attr('src', decoFile);

    // Detectar si no carga
    img.on('error', function() {
      console.error('No se pudo cargar la imagen:', decoFile);
    });

    page.append(img);
  }





  // Si no se agregó ninguna decoración, agregamos una por defecto para evitar página vacía
  if (page.children().length === 0) {
    const img = $('<img>')
      .addClass('decoration top-left rosa-esquina1')
      .attr('src', 'decorations/rosa-esquina1.png')
      .css({ opacity: 0.8, position: 'absolute' });
    page.append(img);
  }
}


function addMediaToPage(page, url, timestamp = null, key = null) {

  let container = page.find('.photo-wrapper');

  // Si no existe el contenedor, lo creamos
  if (container.length === 0) {
    container = $('<div class="photo-wrapper"></div>').css({
      display: 'grid',
      gridTemplateColumns: '1fr 1fr',
      gap: '15px',
      padding: '30px',
      height: '100%',
      alignItems: 'center'
    });
    page.append(container);
  }

  // Si ya hay 2 fotos, no permitir más
  if (container.children().length >= 2) {
    alert("Esta hoja ya tiene 2 recuerdos 💕 Agrega una nueva página.");
    return false;
  }

  const photoBox = $('<div></div>').css({
    position: 'relative',
    textAlign: 'center'
  });

  const img = $('<img>').attr('src', url).css({
    width: '100%',
    maxHeight: '300px',
    objectFit: 'cover',
    borderRadius: '10px',
    boxShadow: '0 4px 12px rgba(0,0,0,0.15)'
  });

  photoBox.append(img);

  // Timestamp
  if (timestamp) {
    const date = new Date(timestamp);
    const formatted = date.toLocaleString('es-PE', { dateStyle: 'short' });
    photoBox.append('<div class="timestamp">📅 ' + formatted + '</div>');
  }

  // Opciones (editar / borrar)
  if (key) {
    const controls = $('<div class="controls"></div>');

    const deleteBtn = $('<button class="delete-btn">Borrar</button>').click(() => {
      if (confirm("¿Seguro borrar este recuerdo?")) {
        database.ref('recuerdos/' + key).remove();
      }
    });

    const replaceBtn = $('<button class="replace-btn">Editar</button>').click(() => {
      const input = $('<input type="file" accept="image/*">').on('change', function(e) {
        const newFile = e.target.files[0];
        if (newFile) {
          const newRef = storage.ref('recuerdos/' + newFile.name);
          newRef.put(newFile).then(() => {
            newRef.getDownloadURL().then(newUrl => {
              database.ref('recuerdos/' + key).update({ 
                url: newUrl, 
                timestamp: firebase.database.ServerValue.TIMESTAMP 
              });
            });
          });
        }
      });
      input.click();
    });

    controls.append(deleteBtn, replaceBtn);
    photoBox.append(controls);
  }

  container.append(photoBox);

  // Si ahora ya hay 2 fotos → hacer flip automático
  if (container.children().length === 2) {
    setTimeout(() => {
      book.turn('next');
    }, 600);
  }

  return true;
}

//                                                                          🔥 Evitar que el flipbook tape el botón
$("#flipbook").css({
  marginBottom: "60px",
  position: "relative",
  zIndex: 1
});


     
                                                                                     // $(document).ready(function () {
$(document).ready(function () {

  book = $("#flipbook").turn({
  width: window.innerWidth < 768 ? 350 : 800,
  height: window.innerWidth < 768 ? 500 : 600,
  autoCenter: true,
  display: window.innerWidth < 768 ? "single" : "double",
  acceleration: true
});

                                                                                                 // 🔥 AHORA sí existe book
  if (book.turn('pages') < 2) {
    const emptyPage = $('<div class="page"></div>');
    addRandomDecorations(emptyPage);
    book.turn('addPage', emptyPage);

    
                                                                                       // Mejorar touch en móvil
  if ('ontouchstart' in window) {
    book.turn('options', { acceleration: true, shadows: false });
  }
  }

}); 

                                                                                  // $(window).resize(function () {

    
  
$(window).resize(function () {

  const isMobile = window.innerWidth < 768;

  book.turn("size",
    isMobile ? 350 : 800,
    isMobile ? 500 : 600
  );

  book.turn("display", isMobile ? "single" : "double");

});




                                                                            //  💪  $("#addPageBtn").click(function() {
 $("#addPageBtn").click(function() {
  const newPage = $('<div class="page"></div>');

  addRandomDecorations(newPage);

  // Contenido mínimo para que Turn.js la muestre
  if (newPage.children().length === 0) {
    newPage.text("Nueva hoja 🖼️");
  }

  const totalPages = book.turn('pages');   
  book.turn('addPage', newPage, totalPages + 1);

  setTimeout(() => {
    book.turn('page', totalPages + 1);
  }, 300);

   console.log("Nueva página agregada. Total páginas:", book.turn('pages'));
});



  // Botones de navegación
  document.getElementById('prevPage')?.addEventListener('click', () => book.turn('previous'));
  document.getElementById('nextPage')?.addEventListener('click', () => book.turn('next'));


                                                                                //    💔 $("#flipbook").bind("turned", function(event, page) {
  $("#flipbook").bind("turned", function(event, page) {
    document.getElementById('prevPage').style.opacity = (page === 1) ? '0.4' : '1';
    document.getElementById('nextPage').style.opacity = (page === book.turn('pages')) ? '0.4' : '1';
  });

  console.log("Decoraciones cargadas:", decorations);
  console.log("Flipbook inicializado correctamente");

    
                                                                             // ❤️Cargar recuerdos guardados (solo si Firebase está disponible)

if (typeof database !== 'undefined' && database) {

  database.ref('recuerdos')
    .orderByChild('timestamp')
    .on('value', (snapshot) => {

      // borrar páginas
      const totalPages = book.turn('pages');
      for (let i = totalPages; i > 1; i--) {
        book.turn('removePage', i);
      }

      let currentPage = null;

      snapshot.forEach((child) => {
        const data = child.val();

        if (!currentPage || 
            !currentPage.find('.photo-wrapper').length || 
            currentPage.find('.photo-wrapper').children().length >= 2) {

          currentPage = $('<div class="page"></div>');
          addRandomDecorations(currentPage);
          book.turn('addPage', currentPage);
        }

        addMediaToPage(currentPage, data.url, data.timestamp, child.key);
      });

      setTimeout(() => book.turn('redraw'), 400);

    });

} else {
  console.warn("Firebase no está disponible");
} 
    
                                                                //           🩷document.getElementById("uploadBtn").addEventListener("click", function() {

    
  document.getElementById("uploadBtn").addEventListener("click", function() {

  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  const status = document.getElementById('uploadStatus');

  if (!file) {
    status.textContent = "Selecciona una imagen primero 💕";
    return;
  }

  status.textContent = "Subiendo a Cloudinary... 💕";

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'album_preset');

  fetch('https://api.cloudinary.com/v1_1/dqf69c8cn/image/upload', {
    method: 'POST',
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    if (data.secure_url) {

      database.ref('recuerdos').push({
        url: data.secure_url,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      status.textContent = "¡Recuerdo agregado! 💖";
      fileInput.value = "";

    } else {
      status.textContent = "Error al subir 😔";
    }

  })
  .catch(err => {
    console.error(err);
    status.textContent = "Error al subir 😔";
  });

});


</script>
